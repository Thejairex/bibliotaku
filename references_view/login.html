    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24

<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- Background Layer with Blur -->
<div class="fixed inset-0 bg-cinematic z-0" data-alt="abstract flowing dark violet and obsidian waves with soft cinematic lighting and deep shadows digital art"></div>
<!-- Main Content Container -->
<main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container/70 backdrop-blur-2xl rounded-xl p-10 md:p-14 shadow-2xl flex flex-col gap-10">
<!-- Brand Header -->
<div class="text-center">
<h1 class="font-headline font-black text-4xl tracking-tighter text-primary mb-2">The Archive</h1>
<p class="font-label text-sm uppercase tracking-[0.2em] text-on-surface-variant font-medium">Digital Curator</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Username/Email -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Email / Username</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Password</label>
<a class="font-label text-[10px] uppercase font-bold text-primary hover:text-primary-container transition-colors tracking-widest" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="mt-4 w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Alternate Action -->
<div class="text-center">
<p class="text-on-surface-variant font-label text-sm">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:text-secondary-fixed transition-colors ml-1" href="#">Sign up instead</a>
</p>
</div>
</div>
</main>
<!-- Footer Integration (Simplified for Login) -->
<footer class="relative z-10 w-full py-8 px-8 border-t border-outline-variant/10">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60">
                © 2024 The Archive. Digital Curation for the Modern Collector.
            </p>
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">API</a>
</div>
</div>
</footer>
</body></html>
